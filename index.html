<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Hero أكاديمية عايد - احترافي</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700;800;900&family=Tajawal:wght@500;700;800&display=swap" rel="stylesheet">
<style>
:root{--primary:#0d2f56;--secondary:#ffc703;--muted:#5d7a9a;--soft:#f4f7fb;--ease:cubic-bezier(.85,0,.15,1);}
*{font-family:"Cairo","Tajawal",system-ui, sans-serif}
body{background:#fff; overflow-x:hidden}
.hero{position:relative; background:#fff; padding:28px 0 36px; overflow:hidden}
.hero:before{content:""; position:absolute; inset:-120px -80px auto -80px; height:520px; background: radial-gradient(600px 340px at 78% 0%, #eaf3ff 0%, transparent 70%), radial-gradient(500px 320px at 12% 10%, #fff8d6 0%, transparent 65%); pointer-events:none}
.container-ayed{max-width:1320px; margin:0 auto; padding:0 20px; position:relative; z-index:1}
.row-ayed{display:grid; grid-template-columns:1.05fr .95fr; gap:36px; align-items:center; min-height:78vh}
@media(max-width:991px){.row-ayed{grid-template-columns:1fr; gap:22px} .visual-wrap{order:1} .content-wrap{order:2}}
.eyebrow{display:inline-flex; align-items:center; gap:8px; background:#eef6ff; border:1px solid #d7e8fb; color:var(--primary); font-weight:800; font-size:13px; padding:8px 14px; border-radius:999px; letter-spacing:.2px}
.title-wrap{min-height:112px}
.title{font-weight:900; line-height:1.18; font-size:clamp(30px,4.6vw,52px); color:var(--primary); margin:16px 0 10px; letter-spacing:-.02em}
.cursor{display:inline-block; width:3px; height:.95em; background:var(--primary); margin-right:6px; vertical-align:-.1em; animation:blink 1s step-end infinite; border-radius:2px}
@keyframes blink{0%,50%{opacity:1}51%,100%{opacity:0}}
.desc{font-size:clamp(14.5px,1.45vw,17.2px); line-height:1.95; color:var(--muted); font-weight:600; max-width:560px; margin-bottom:18px}
.features{list-style:none; padding:0; margin:0 0 20px; display:grid; gap:10px}
.features li{display:flex; align-items:center; gap:10px; font-weight:800; font-size:14px; color:var(--primary)}
.check{width:28px; height:28px; border-radius:999px; display:grid; place-items:center; background:#e9f3ff; border:1px solid #cfe2ff; color:#1766b8; flex:0 0 28px}
.cta-row{display:flex; flex-wrap:wrap; gap:12px; margin-bottom:14px}
.btn-main{height:56px; padding:0 26px; border-radius:14px; background:var(--secondary); color:var(--primary); border:1px solid #efbd00; font-weight:900; font-size:15.2px; box-shadow:0 10px 22px rgba(255,199,3,.32),0 2px 10px rgba(13,47,86,.06); display:inline-flex; align-items:center; gap:9px; transition:transform .32s var(--ease), box-shadow .32s var(--ease)}
.btn-main:hover{transform:translateY(-2px); box-shadow:0 20px 38px rgba(255,199,3,.42)}
.btn-ghost{height:56px; padding:0 20px; border-radius:14px; background:#fff; color:var(--primary); border:1.6px solid #c9d9eb; font-weight:800; font-size:14.6px; display:inline-flex; align-items:center; gap:8px; transition:.28s var(--ease)}
.btn-ghost:hover{border-color:var(--primary); background:#f7fbff; transform:translateY(-1px)}
.trust{display:flex; flex-wrap:wrap; gap:10px 14px; align-items:center; padding-top:14px; border-top:1px dashed #deebf7; color:#6f8aab; font-weight:700; font-size:13px}
.stars{color:#ffb300; letter-spacing:1px}
/* Visual */
.visual-wrap{position:relative;}
.visual{position:relative; width:100%; aspect-ratio:1.02; max-width:560px; margin-inline:auto; display:grid; place-items:center; isolation:isolate}
.blob{position:absolute; width:84%; height:84%; background:radial-gradient(120% 120% at 50% 30%, #f3f8ff 0%, #eaf2ff 46%, #f6f9ff 100%); border-radius:36px; filter:blur(.2px); box-shadow:none; z-index:0}
.dots-bg{position:absolute; inset:10% 6% 14% 6%; background-image: radial-gradient(#d6e6f8 1.6px, transparent 1.7px); background-size:18px 18px; opacity:.55; mask-image: radial-gradient(70% 70% at 50% 50%, #000 60%, transparent 100%); z-index:0}
.img-card{position:relative; z-index:1; width:100%; aspect-ratio:.92; display:grid; place-items:center; background:#fff; border-radius:28px; overflow:hidden; box-shadow:none; border-radius: 50%; filter: blur(0.5px);
            
            mask-image: radial-gradient(
                ellipse at center,
                rgba(0,0,0,1) 45%,  
                rgba(0,0,0,0) 70%   
            );
            -webkit-mask-image: radial-gradient(
                ellipse at center,
                rgba(0,0,0,1) 45%,
                rgba(0,0,0,0) 70%
            );}
.img-inner{position:relative; width:100%; height:100%; display:grid; place-items:center; background:#fff; overflow:hidden}
.hero-img{width:100%; height:100%; object-fit:contain;  border-radius: 100px;   background:#fff; transform:scale(.985); transition:transform .9s var(--ease), opacity .6s var(--ease); will-change:transform}
.shine{position:absolute; inset:0; pointer-events:none; overflow:hidden}
.shine:after{content:""; position:absolute; top:-20%; bottom:-20%; width:46%; background: linear-gradient(100deg, transparent 0%, rgba(255,255,255,0) 20%, rgba(255,255,255,.9) 50%, transparent 80%); transform:translateX(-180%) skewX(-18deg); animation:shineMove 3s ease-in-out infinite;}
@keyframes shineMove{0%{transform:translateX(-180%) skewX(-18deg)} 55%{transform:translateX(220%) skewX(-18deg)} 100%{transform:translateX(220%) skewX(-18deg)}}
.float{position:absolute; z-index:3; display:flex; align-items:center; gap:10px; background:#ffffff; border:1px solid #e3eefb; border-radius:16px; padding:10px 12px; box-shadow:0 14px 30px rgba(13,47,86,.12),0 2px 8px rgba(13,47,86,.06); font-weight:800; min-width:138px; animation:floatSoft var(--dur,6.8s) ease-in-out infinite alternate; will-change:transform}
@keyframes floatSoft{0%{transform:translateY(0) translateX(0) rotate(0deg)} 100%{transform:translateY(-11px) translateX(2px) rotate(.35deg)}}
.float .ic{width:36px; height:36px; border-radius:11px; display:grid; place-items:center; flex:0 0 36px}
.float .v{font-size:14.2px; color:var(--primary); line-height:1}
.float .l{font-size:11.6px; color:#6b87a6; font-weight:700; margin-top:3px}
.controls{margin-top:18px; display:grid; grid-template-columns: auto 1fr auto; align-items:center; gap:14px}
@media(max-width:991px){.controls{grid-template-columns:1fr auto} .progress-wrap{grid-column:1 / -1; order:3}}
.dots{display:flex; gap:8px; align-items:center}
.dot{width:8px; height:8px; border-radius:999px; border:0; background:#d4e2f2; transition:.42s var(--ease); cursor:pointer}
.dot.active{width:30px; background:var(--primary); box-shadow:0 6px 14px rgba(13,47,86,.18)}
.progress-wrap{height:4px; background:#e8eef6; border-radius:999px; overflow:hidden; position:relative}
.progress-fill{position:absolute; inset:0 auto 0 0; width:0%; background:linear-gradient(90deg,var(--secondary),#ffdf61); border-radius:999px}
.arrows{display:flex; gap:8px; opacity:0; transform:translateY(6px); transition:.34s var(--ease)}
.hero:hover .arrows{opacity:1; transform:none}
@media(max-width:991px){.arrows{opacity:1; transform:none}}
.arrow{width:42px; height:42px; border-radius:12px; border:1px solid #d8e6f5; background:#fff; display:grid; place-items:center; box-shadow:0 8px 18px rgba(13,47,86,.08); color:var(--primary); cursor:pointer; transition:.22s var(--ease)}
.arrow:hover{transform:translateY(-1px); border-color:var(--primary)}
/* slide animation */
.slide-enter .content-wrap{animation:contentIn .78s var(--ease) both}
@keyframes contentIn{from{opacity:0; transform:translateY(16px) scale(.985); filter:blur(6px)} to{opacity:1; transform:translateY(0) scale(1); filter:blur(0)}}

/* إزالة أي شادو من الصور حسب الطلب */
.img-card, .img-inner, .hero-img { box-shadow:none !important; filter:none !important; border: none; }
.visual { filter:none !important; }
</style>
</head>
<body>
<section class="hero" id="hero">
  <div class="container-ayed">
    <div class="row-ayed" id="rowHero">
      <!-- Text Right -->
      <div class="content-wrap" id="contentWrap">
        <span class="eyebrow" id="eyebrow"><i class="bi bi-stars"></i><span id="eyebrowText"></span></span>
        <div class="title-wrap"><h1 class="title"><span id="typed"></span><span class="cursor" id="cursor"></span></h1></div>
        <p class="desc" id="desc"></p>
        <ul class="features" id="features"></ul>
        <div class="cta-row">
          <a href="" class="btn-main" id="ctaMain" style="text-decoration: none;"><span id="ctaMainText"></span> <i class="bi bi-arrow-left-short fs-5"></i></a>
          <a href="" class="btn-ghost" id="ctaSec" style="text-decoration: none;"><i class="bi bi-play-circle"></i> <span id="ctaSecText"></span></a>
        </div>
        <div class="trust">
          <span class="stars">★★★★★</span>
          <span id="trustText"></span>
          <span style="width:5px;height:5px;border-radius:50%;background:#cfe0f3;display:inline-block"></span>
          <span style="display:inline-flex;align-items:center;gap:6px"><i class="bi bi-shield-check" style="color:#0d5fb8"></i> دفع آمن وضمان</span>
        </div>
        <div class="controls">
          <div class="dots" id="dots"></div>
          <div class="progress-wrap"><div class="progress-fill" id="progress"></div></div>
          <div class="arrows">
            <button class="arrow" id="prev" aria-label="السابق"><i class="bi bi-chevron-right"></i></button>
            <button class="arrow" id="next" aria-label="التالي"><i class="bi bi-chevron-left"></i></button>
          </div>
        </div>
      </div>
      <!-- Visual Left -->
      <div class="visual-wrap">
        <div class="visual" id="visual">
          <!-- <div class="blob"></div><div class="dots-bg"></div> -->
          <div class="img-card"><div class="img-inner"><img id="heroImg" class="hero-img" alt="طالب سعودي"><div class="shine"></div></div></div>
          <!-- floats injected -->
        </div>
      </div>
    </div>
  </div>
</section>

<script>
const slides = [
{
  eyebrow:"الأكثر طلبا للطلاب السعوديين",
  eyebrowIcon:"bi-mortarboard",
  title:"مستقبلك الأكاديمي يبدأ من هنا",
  desc:"انضم لأكثر من 100 ألف طالب سعودي حققوا أهدافهم مع أكاديمية عايد. شروحات مبسطة، ملخصات مركزة، ومتابعة حتى الإتقان.",
  features:[ "شرح مبسط لكل الفئات التعليمية", " ملفات PDF جاهزة للطباعة والمراجعة", "متابعة يومية مع مشرف أكاديمي" ],
  primary:{text:"ابدأ الآن مجانا", link:"/register"},
  secondary:{text:"شاهد كيف نعمل", link:"/how-it-works"},
  trust:"موثوق من 100,000+ طالب وتقييم 4.9/5",
  img:`01.webp`, alt:"طالب سعودي يذاكر على مكتب",
  stats:[
    {value:"100K+ طالب",label:"متفوق معنا",bg:"#e6f0ff",icon:"bi-people",style:{top:"8%",right:"-2%"},delay:"0s",dur:"6.8s"},
    {value:"98% نجاح",label:"نسبة التفوق",bg:"#fff3c2",icon:"bi-graph-up-arrow",style:{bottom:"18%",right:"-6%"},delay:".4s",dur:"7.4s"},
    {value:"4.9/5",label:"تقييم الطلاب",bg:"#e7f9ec",icon:"bi-star-fill",style:{top:"22%",left:"-8%"},delay:".8s",dur:"6.2s"},
  ]
},
{
  eyebrow:"شرح يفهمك مو يحفظك",
  eyebrowIcon:"bi-easel2",
  title:"شرح يفهمك، مو يحفظك",
  desc:"نحول أصعب المفاهيم إلى قصص سهلة. أساتذة متخصصون يختصرون عليك ساعات الحفظ بأسلوب تفاعلي يرسخ المعلومة.",
  features:[ "أساتذة خبرة 10+ سنوات في المناهج السعودية", "أمثلة حية من نماذج الاختبارات", "إعادة الشرح حتى تتقن 100%" ],
  primary:{text:"جرب حصة مجانية", link:"/free-lesson"},
  secondary:{text:"تعرف على المدرسين", link:"/teachers"},
  trust:"1200+ ساعة شرح مسجلة بجودة عالية",
  img:`02.webp`, alt:"مدرس سعودي يشرح",
  stats:[
    {value:"1200+ ساعة",label:"شرح مسجل",bg:"#e6f0ff",icon:"bi-collection-play",style:{top:"10%",left:"-6%"},delay:"0s",dur:"7s"},
    {value:"0% ملل",label:"تفاعل كامل",bg:"#fff3c2",icon:"bi-emoji-smile",style:{bottom:"14%",right:"-4%"},delay:".5s",dur:"6.6s"},
    {value:"لايف أسبوعي",label:"مراجعة مباشرة",bg:"#f3e8ff",icon:"bi-broadcast",style:{top:"6%",right:"2%"},delay:".9s",dur:"7.2s"},
  ]
},
{
  eyebrow:"تأسيس من الصفر بثقة",
  eyebrowIcon:"bi-book",
  title:"تأسيس قوي يبني ثقة تدوم",
  desc:"من الصفر حتى الاحتراف بخطة 30 يوم ذكية، بنك أسئلة ضخم، وتحليل مستوى أسبوعي يضمن وصولك للاختبار مطمئنا.",
  features:[ "خطة مذاكرة ذكية 30 يوم", "بنك 5000+ سؤال محلول", "تحليل أداء وتوصيات أسبوعية" ],
  primary:{text:"احصل على خطتك", link:"/plan"},
  secondary:{text:"حمّل ملزمة مجانية", link:"/free-pdf"},
  trust:"95% من طلابنا يتجاوزون توقعاتهم",
  img:`03.webp`, alt:"طالبة سعودية تقرأ كتاب",
  stats:[
    {value:"خطة 30 يوم",label:"مخصصة لك",bg:"#e7f9ec",icon:"bi-calendar-check",style:{top:"14%",right:"-5%"},delay:"0s",dur:"6.4s"},
    {value:"PDF جاهز",label:"ملازم مطبوعة",bg:"#fff3c2",icon:"bi-file-earmark-text",style:{bottom:"18%",left:"-6%"},delay:".45s",dur:"7.1s"},
    {value:"+5000 سؤال",label:"بنك أسئلة",bg:"#e6f0ff",icon:"bi-patch-question",style:{top:"4%",left:"2%"},delay:".8s",dur:"6.8s"},
  ]
},
{
  eyebrow:"مهارات لسوق العمل",
  eyebrowIcon:"bi-award",
  title:"ليس مجرد دورات، بل مهارات تصنع فرقا",
  desc:"تعلم ما يطلبه السوق فعليا. مشاريع تطبيقية وشهادات معتمدة توثّق مستواك وتفتح لك الأبواب..",
  features:[ "مشاريع عملية بملف أعمال احترافي", "شهادة معتمدة برقم تحقق", "توجيه وظيفي ومقابلات تجريبية" ],
  primary:{text:"استكشف المسارات", link:"/tracks"},
  secondary:{text:"قصص الخريجين", link:"/success-stories"},
  trust:"عايد لتطوير مهارات فريقك",
  img:`05.webp`, alt:"مدربة سعودية تقدم دورة",
  stats:[
    {value:"شهادة معتمدة",label:"برقم تحقق",bg:"#fff3c2",icon:"bi-patch-check-fill",style:{top:"10%",right:"-4%"},delay:"0s",dur:"6.7s"},
    {value:"مشاريع واقعية",label:"Portfolio جاهز",bg:"#e6f0ff",icon:"bi-briefcase",style:{bottom:"18%",left:"-6%"},delay:".5s",dur:"7s"},
    {value:"+80 شريك",label:"فرص توظيف",bg:"#e7f9ec",icon:"bi-buildings",style:{top:"18%",left:"-7%"},delay:".9s",dur:"6.5s"},
  ]
},
{
  eyebrow:"فلاش سيل على فترات ",
  eyebrowIcon:"bi-gift",
  title:"قصتك القادمة هي قصة نجاحنا",
  desc:"آلاف بدأوا مثلك تماما. الفرق أنهم قرروا البدء اليوم. اشترك الآن واستفد من خصومات تصل حتى 40%..",
  features:[ " خصومات تصل حتى 40%", "فلاش سيل حصري لمشتركين تليجرام كل فترة", "مجتمع طلاب داعم ومحفز" ],
  primary:{text:"احجز مقعدك الآن", link:"/checkout"},
  secondary:{text:"تحدث مع مستشار", link:"https://wa.me/966500000000"},
  trust:"العرض ينتهي قريبا ",
  img:`06.webp`, alt:"خريج سعودي يحمل شهادة",
  stats:[
    {value:"خصم 40%",label:"ينتهي قريبا",bg:"#ffe9a8",icon:"bi-lightning-charge-fill",style:{top:"8%",right:"-2%"},delay:"0s",dur:"6.2s"},
    {value:"ضمان ذهبي",label:"14 يوم",bg:"#e6f0ff",icon:"bi-shield-lock",style:{bottom:"14%",right:"-6%"},delay:".45s",dur:"7.4s"},
    {value:"17 مقعد",label:"متبقي فقط",bg:"#ffe2e2",icon:"bi-fire",style:{top:"20%",left:"-9%"},delay:".85s",dur:"6.8s"},
  ]
},
];

let current=0, timer=null, typingTimer=null, progressTimer=null;
const typedEl=document.getElementById('typed');
const descEl=document.getElementById('desc');
const featuresEl=document.getElementById('features');
const eyebrowText=document.getElementById('eyebrow');
const heroImg=document.getElementById('heroImg');
const trustText=document.getElementById('trustText');
const ctaMainText=document.getElementById('ctaMainText');
const ctaSecText=document.getElementById('ctaSecText');
const ctaMainEl=document.getElementById('ctaMain');
const ctaSecEl=document.getElementById('ctaSec');
const dotsEl=document.getElementById('dots');
const progressEl=document.getElementById('progress');
const visualEl=document.getElementById('visual');
const rowEl=document.getElementById('rowHero');

function createDots(){
  dotsEl.innerHTML='';
  slides.forEach((_,i)=>{
    const b=document.createElement('button'); b.className='dot'+(i===current?' active':''); b.setAttribute('aria-label','سلايد '+(i+1));
    b.onclick=()=>goTo(i,true); dotsEl.appendChild(b);
  });
}
function typeWriter(text, cb){
  clearInterval(typingTimer); typedEl.textContent=''; let idx=0;
  typingTimer=setInterval(()=>{
    typedEl.textContent=text.slice(0,idx+1); idx++; if(idx>=text.length){clearInterval(typingTimer); if(cb) cb();}
  },42);
}
function renderFloats(stats){
  visualEl.querySelectorAll('.float').forEach(e=>e.remove());
  stats.forEach(s=>{
    const d=document.createElement('div'); d.className='float'; d.style.top=s.style.top||'auto'; d.style.bottom=s.style.bottom||'auto'; d.style.left=s.style.left||'auto'; d.style.right=s.style.right||'auto'; d.style.animationDelay=s.delay; d.style.setProperty('--dur',s.dur);
    d.innerHTML=`<div class="ic" style="background:${s.bg}"><i class="bi ${s.icon}" style="color:#0d2f56"></i></div><div><div class="v">${s.value}</div><div class="l">${s.label}</div></div>`;
    visualEl.appendChild(d);
  });
}
function renderSlide(i, instant=false){
  const s=slides[i];
  clearInterval(progressTimer); progressEl.style.transition='none'; progressEl.style.width='0%';
  document.getElementById('eyebrow').innerHTML=`<i class="bi ${s.eyebrowIcon}"></i><span>${s.eyebrow}</span>`;
  descEl.textContent=s.desc;
  featuresEl.innerHTML=s.features.map(f=>`<li><span class="check"><i class="bi bi-check-lg"></i></span>${f}</li>`).join('');

  // هنا التعديل الجديد: النص + اللينك
  const p1 = typeof s.primary === 'object'? s.primary : {text:s.primary, link:'#'};
  const p2 = typeof s.secondary === 'object'? s.secondary : {text:s.secondary, link:'#'};
  ctaMainText.textContent = p1.text;
  ctaSecText.textContent = p2.text;
  ctaMainEl.href = p1.link;
  ctaSecEl.href = p2.link;

  trustText.textContent=s.trust;
  heroImg.style.opacity='0'; heroImg.style.transform='scale(.96) translateY(8px)';
  setTimeout(()=>{heroImg.src=s.img; heroImg.alt=s.alt; heroImg.style.opacity='1'; heroImg.style.transform='scale(1) translateY(0)';}, instant?0:180);
  renderFloats(s.stats);
  typeWriter(s.title);
  createDots();
  rowEl.classList.remove('slide-enter'); void rowEl.offsetWidth; rowEl.classList.add('slide-enter');
  requestAnimationFrame(()=>{
    progressEl.style.transition='none'; progressEl.style.width='0%';
    requestAnimationFrame(()=>{ progressEl.style.transition='width 20s linear'; progressEl.style.width='100%'; });
  });
  clearInterval(timer); timer=setTimeout(()=>next(),20000);
}
function next(){ current=(current+1)%slides.length; renderSlide(current); }
function prevSlide(){ current=(current-1+slides.length)%slides.length; renderSlide(current); }
function goTo(i,user=false){ current=i; renderSlide(i, user); }
document.getElementById('next').onclick=next;
document.getElementById('prev').onclick=prevSlide;
let paused=false;
document.getElementById('hero').addEventListener('mouseenter',()=>{ if(!paused){progressEl.style.animationPlayState='paused'; progressEl.style.transition='none'; const w=progressEl.offsetWidth; const parent=progressEl.parentElement.offsetWidth; const pct=(w/parent)*100; progressEl.style.width=pct+'%'; clearTimeout(timer); paused=true; } });
document.getElementById('hero').addEventListener('mouseleave',()=>{ if(paused){ const w=parseFloat(progressEl.style.width)||0; const remain=(100-w)/100*20000; progressEl.style.transition=`width ${remain}ms linear`; progressEl.style.width='100%'; timer=setTimeout(()=>next(),remain); paused=false; } });
createDots(); renderSlide(0,true);
</script>
</body>
</html>
