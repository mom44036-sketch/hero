<style>
/* 
هذه التنسيقات (تجاوب الجوال، تأثيرات الماوس، والحركات) 
لا يمكن كتابتها كـ Inline CSS ويجب أن تبقى هنا ليعمل الكود كما هو 100% 
*/
.hero:before { content:""; position:absolute; inset:-120px -80px auto -80px; height:520px; background: radial-gradient(600px 340px at 78% 0%, #eaf3ff 0%, transparent 70%), radial-gradient(500px 320px at 12% 10%, #fff8d6 0%, transparent 65%); pointer-events:none; }
@media(max-width:991px) {
  .row-ayed { grid-template-columns:1fr !important; gap:22px !important; }
  .visual-wrap { order:1 !important; }
  .content-wrap { order:2 !important; }
  .controls { grid-template-columns:1fr auto !important; }
  .progress-wrap { grid-column:1 / -1 !important; order:3 !important; }
  .arrows { opacity:1 !important; transform:none !important; }
}
@keyframes blink { 0%,50% {opacity:1} 51%,100% {opacity:0} }
.btn-main:hover { transform:translateY(-2px) !important; box-shadow:0 20px 38px rgba(255,199,3,.42) !important; }
.btn-ghost:hover { border-color:var(--primary) !important; background:#f7fbff !important; transform:translateY(-1px) !important; }
.shine:after { content:""; position:absolute; top:-20%; bottom:-20%; width:46%; background: linear-gradient(100deg, transparent 0%, rgba(255,255,255,0) 20%, rgba(255,255,255,.9) 50%, transparent 80%); transform:translateX(-180%) skewX(-18deg); animation:shineMove 3s ease-in-out infinite; }
@keyframes shineMove { 0% {transform:translateX(-180%) skewX(-18deg)} 55% {transform:translateX(220%) skewX(-18deg)} 100% {transform:translateX(220%) skewX(-18deg)} }
@keyframes floatSoft { 0% {transform:translateY(0) translateX(0) rotate(0deg)} 100% {transform:translateY(-11px) translateX(2px) rotate(.35deg)} }
.arrows { opacity:0; transform:translateY(6px); }
.hero:hover .arrows { opacity:1 !important; transform:none !important; }
.arrow:hover { transform:translateY(-1px) !important; border-color:var(--primary) !important; }
.slide-enter .content-wrap { animation:contentIn .78s var(--ease) both; }
@keyframes contentIn { from {opacity:0; transform:translateY(16px) scale(.985); filter:blur(6px)} to {opacity:1; transform:translateY(0) scale(1); filter:blur(0)} }
</style>

const SLIDE_DURATION = 60000; // مدة كل سلايد 60 ثانية

function createDots(){
  dotsEl.innerHTML='';
  slides.forEach((_,i)=>{

    let cssText = 'width:8px; height:8px; border-radius:999px; border:0; background:#d4e2f2; transition:.42s var(--ease); cursor:pointer;';

    }
    b.style.cssText = cssText;
    
    b.onclick=()=>goTo(i,true); 
    dotsEl.appendChild(b);
  });
}

function typeWriter(text){
  clearInterval(typingTimer); typedEl.textContent=''; let idx=0;
  typingTimer=setInterval(()=>{
    typedEl.textContent=text.slice(0,idx+1); idx++; if(idx>=text.length){clearInterval(typingTimer);}
  },42);
}

function renderFloats(stats){
  visualEl.querySelectorAll('.float').forEach(e=>e.remove());
  stats.forEach(s=>{
    const d=document.createElement('div'); 
    d.className='float'; 
    d.style.cssText = `position:absolute; z-index:3; display:flex; align-items:center; gap:10px; background:#ffffff; border:1px solid #e3eefb; border-radius:16px; padding:10px 12px; box-shadow:0 14px 30px rgba(13,47,86,.12),0 2px 8px rgba(13,47,86,.06); font-weight:800; min-width:138px; animation:floatSoft var(--dur,6.8s) ease-in-out infinite alternate; will-change:transform; top:${s.style.top||'auto'}; bottom:${s.style.bottom||'auto'}; left:${s.style.left||'auto'}; right:${s.style.right||'auto'}; animation-delay:${s.delay}; --dur:${s.dur};`;
    
    d.innerHTML=`<div class="ic" style="width:36px; height:36px; border-radius:11px; display:grid; place-items:center; flex:0 0 36px; background:${s.bg}"><i class="bi ${s.icon}" style="color:#0d2f56"></i></div><div><div class="v" style="font-size:14.2px; color:var(--primary); line-height:1">${s.value}</div><div class="l" style="font-size:11.6px; color:#6b87a6; font-weight:700; margin-top:3px">${s.label}</div></div>`;

}

// دوال التحكم في الوقت بشكل صحيح
function startProgress(duration){
  clearTimeout(timer);
  slideStartTime = Date.now();
  remainingTime = duration;
  progressEl.style.transition = 'none';
  progressEl.style.width = '0%';
  void progressEl.offsetWidth; // force reflow
  requestAnimationFrame(()=>{
    progressEl.style.transition = `width ${remainingTime}ms linear`;
    progressEl.style.width = '100%';
  });
  timer = setTimeout(()=>next(), remainingTime);
}

function pauseProgress(){
  if(isPaused) return;
  const elapsed = Date.now() - slideStartTime;
  remainingTime = Math.max(0, remainingTime - elapsed);
  clearTimeout(timer);
  // ثبت البار عند النسبة الحالية
  const elapsedPercent = ((SLIDE_DURATION - remainingTime) / SLIDE_DURATION) * 100;
  progressEl.style.transition = 'none';
  progressEl.style.width = elapsedPercent + '%';
  isPaused = true;
}

function resumeProgress(){
  if(!isPaused) return;
  isPaused = false;
  slideStartTime = Date.now();
  progressEl.style.transition = `width ${remainingTime}ms linear`;
  progressEl.style.width = '100%';
  timer = setTimeout(()=>next(), remainingTime);
}

function renderSlide(i){

  remainingTime = SLIDE_DURATION;

  descEl.textContent=s.desc;
  
  // Inline CSS للعناصر التي يتم إضافتها عبر الجافاسكربت
  featuresEl.innerHTML=s.features.map(f=>`<li style="display:flex; align-items:center; gap:10px; font-weight:800; font-size:14px; color:var(--primary)"><span class="check" style="width:28px; height:28px; border-radius:999px; display:grid; place-items:center; background:#e9f3ff; border:1px solid #cfe2ff; color:#1766b8; flex:0 0 28px"><i class="bi bi-check-lg"></i></span>${f}</li>`).join('');

  const p1 = typeof s.primary === 'object'? s.primary : {text:s.primary, link:'#'};
  const p2 = typeof s.secondary === 'object'? s.secondary : {text:s.secondary, link:'#'};
  ctaMainText.textContent = p1.text;
  ctaSecText.textContent = p2.text;
  ctaMainEl.href = p1.link;
  ctaSecEl.href = p2.link;

  trustText.textContent=s.trust;
  heroImg.style.opacity='0'; heroImg.style.transform='scale(.96) translateY(8px)';
  setTimeout(()=>{heroImg.src=s.img; heroImg.alt=s.alt; heroImg.style.opacity='1'; heroImg.style.transform='scale(1) translateY(0)';}, 180);
  renderFloats(s.stats);
  typeWriter(s.title);
  createDots();
  rowEl.classList.remove('slide-enter'); void rowEl.offsetWidth; rowEl.classList.add('slide-enter');

  // ابدأ العد من جديد
  startProgress(SLIDE_DURATION);
}

function next(){ current=(current+1)%slides.length; renderSlide(current); }
function prevSlide(){ current=(current-1+slides.length)%slides.length; renderSlide(current); }
function goTo(i){ current=i; renderSlide(i); }

document.getElementById('next').onclick=next;
document.getElementById('prev').onclick=prevSlide;

// الوقوف عند الـ hover والاكمال عند الخروج
heroEl.addEventListener('mouseenter', pauseProgress);
heroEl.addEventListener('mouseleave', resumeProgress);

createDots(); renderSlide(0);
</script>
</body>
</html>
